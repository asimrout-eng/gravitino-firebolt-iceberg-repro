# Alternative: Two NLBs instead of the ALB Ingress.
# Use this if the AWS Load Balancer Controller is not installed,
# or to mirror the customer's NLB/NodePort setup exactly.
#
# Usage:
#   kubectl apply -f k8s/03-public-nlb.yaml
#   # Instead of: kubectl apply -f k8s/03-public-alb.yaml
#
# Uses in-tree cloud provider (service.beta.kubernetes.io/aws-load-balancer-type: "nlb")
# so NO AWS Load Balancer Controller is required.
#
# Firebolt SQL will need TWO different hostnames:
#   URL = 'http://<GRAVITINO_NLB>:9001/iceberg/'
#   OAUTH_SERVER_URI = 'http://<OAUTH_NLB>:8080'
#
# Get DNS names:
#   kubectl get svc gravitino-nlb oauth-nlb -n gravitino-repro

# NLB 1: Gravitino Iceberg REST (port 9001)
# Uses in-tree cloud provider annotation — no AWS Load Balancer Controller needed.
apiVersion: v1
kind: Service
metadata:
  name: gravitino-nlb
  namespace: gravitino-repro
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: gravitino-iceberg-rest
  ports:
    - name: gravitino
      port: 9001
      targetPort: 9001
---
# NLB 2: OAuth Token Server (port 8080)
apiVersion: v1
kind: Service
metadata:
  name: oauth-nlb
  namespace: gravitino-repro
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: oauth-server
  ports:
    - name: oauth
      port: 8080
      targetPort: 8080
