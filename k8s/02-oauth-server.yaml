# Minimal OAuth2 token server for Gravitino authentication.
# Pure Python 3 stdlib — no dependencies.
# Issues HS256-signed JWTs that Gravitino validates.
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth-server-code
  namespace: gravitino-repro
data:
  server.py: |
    #!/usr/bin/env python3
    import base64, hashlib, hmac, json, os, time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import parse_qs

    SIGN_KEY_B64  = os.environ["OAUTH_SIGN_KEY_B64"]
    CLIENT_ID     = os.environ.get("OAUTH_CLIENT_ID", "firebolt")
    CLIENT_SECRET = os.environ["OAUTH_CLIENT_SECRET"]
    AUDIENCE      = os.environ.get("OAUTH_AUDIENCE", "gravitino")
    TOKEN_TTL     = int(os.environ.get("TOKEN_TTL", "3600"))
    PORT          = int(os.environ.get("PORT", "8080"))

    _SIGN_KEY = base64.b64decode(SIGN_KEY_B64 + "==")

    def _b64url(data):
        return base64.urlsafe_b64encode(data).rstrip(b"=").decode()

    def _make_jwt(subject):
        now = int(time.time())
        header  = _b64url(json.dumps({"alg":"HS256","typ":"JWT"}, separators=(",",":")).encode())
        claims  = {"iss":"gravitino-oauth","sub":subject,"aud":AUDIENCE,"iat":now,"exp":now+TOKEN_TTL}
        payload = _b64url(json.dumps(claims, separators=(",",":")).encode())
        sig     = hmac.new(_SIGN_KEY, f"{header}.{payload}".encode(), hashlib.sha256).digest()
        return f"{header}.{payload}.{_b64url(sig)}"

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args): print(fmt % args, flush=True)

        def do_GET(self):
            if self.path == "/health":
                self._json(200, {"status": "ok"})
            else:
                self._json(404, {"error": "not_found"})

        def do_POST(self):
            if self.path not in ("/oauth/tokens", "/oauth2/token"):
                self._json(404, {"error": "not_found"}); return
            length = int(self.headers.get("Content-Length", 0))
            params = {k: v[0] for k, v in parse_qs(self.rfile.read(length).decode()).items()}
            if params.get("grant_type") != "client_credentials":
                self._json(400, {"error": "unsupported_grant_type"}); return
            if params.get("client_id") != CLIENT_ID or params.get("client_secret") != CLIENT_SECRET:
                self._json(401, {"error": "invalid_client"}); return
            self._json(200, {"access_token": _make_jwt(params["client_id"]), "token_type": "bearer", "expires_in": TOKEN_TTL})

        def _json(self, code, body):
            data = json.dumps(body).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

    if __name__ == "__main__":
        print(f"OAuth server on :{PORT} | audience={AUDIENCE} client_id={CLIENT_ID}", flush=True)
        HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth-credentials
  namespace: gravitino-repro
type: Opaque
stringData:
  OAUTH_SIGN_KEY_B64: "Z3Jhdml0aW5vLXJlcHJvLXNpZ24ta2V5LTIwMjY="
  OAUTH_CLIENT_SECRET: "repro-secret-change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-server
  namespace: gravitino-repro
  labels:
    app: oauth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth-server
  template:
    metadata:
      labels:
        app: oauth-server
    spec:
      containers:
        - name: oauth-server
          image: python:3.11-slim
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
          env:
            - name: OAUTH_SIGN_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: oauth-credentials
                  key: OAUTH_SIGN_KEY_B64
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-credentials
                  key: OAUTH_CLIENT_SECRET
            - name: OAUTH_CLIENT_ID
              value: "firebolt"
            - name: OAUTH_AUDIENCE
              value: "gravitino"
          volumeMounts:
            - name: server-code
              mountPath: /app
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: server-code
          configMap:
            name: oauth-server-code
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-server
  namespace: gravitino-repro
spec:
  selector:
    app: oauth-server
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
