# FIXED: No GRAVITINO_S3_ACCESS_KEY or GRAVITINO_S3_SECRET_KEY env vars.
# No aws-credentials Secret reference.
# IRSA provides credentials via AWS_WEB_IDENTITY_TOKEN_FILE + AWS_ROLE_ARN
# which are automatically injected by EKS into the pod environment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino-repro
  labels:
    app: gravitino-iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gravitino-iceberg-rest
  template:
    metadata:
      labels:
        app: gravitino-iceberg-rest
    spec:
      serviceAccountName: gravitino-sa
      containers:
        - name: gravitino-iceberg-rest
          image: apache/gravitino-iceberg-rest:1.2.0
          ports:
            - name: iceberg-rest
              containerPort: 9001
          envFrom:
            - configMapRef:
                name: gravitino-config
          # ✅ No GRAVITINO_S3_ACCESS_KEY or GRAVITINO_S3_SECRET_KEY here.
          # This prevents rewrite_config.py from writing static keys to config.
          # The aws-irsa provider reads AWS_WEB_IDENTITY_TOKEN_FILE instead,
          # which EKS/IRSA injects automatically.
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino-repro
spec:
  selector:
    app: gravitino-iceberg-rest
  ports:
    - port: 9001
      targetPort: 9001
  type: ClusterIP
