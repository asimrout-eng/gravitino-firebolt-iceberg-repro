# BROKEN: Injects GRAVITINO_S3_ACCESS_KEY from Secret.
# When Secret has placeholder/blank values, rewrite_config.py writes
# blank s3-access-key-id to config, overriding the IRSA credential chain.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino-repro
  labels:
    app: gravitino-iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gravitino-iceberg-rest
  template:
    metadata:
      labels:
        app: gravitino-iceberg-rest
    spec:
      serviceAccountName: gravitino-sa
      containers:
        - name: gravitino-iceberg-rest
          image: apache/gravitino-iceberg-rest:1.2.0
          ports:
            - name: iceberg-rest
              containerPort: 9001
          envFrom:
            - configMapRef:
                name: gravitino-config
          env:
            # ⚠️  PROBLEM: These env vars cause rewrite_config.py to write
            # s3-access-key-id into the config. If values are blank/invalid,
            # S3 requests fail. With IRSA these should NOT exist at all.
            - name: GRAVITINO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: GRAVITINO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino-repro
spec:
  selector:
    app: gravitino-iceberg-rest
  ports:
    - port: 9001
      targetPort: 9001
  type: ClusterIP
