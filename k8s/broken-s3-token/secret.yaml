# BROKEN: Static AWS credentials — blank or placeholder values
# cause rewrite_config.py to write empty s3-access-key-id to config.
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: gravitino-repro
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_YOUR_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_YOUR_SECRET_KEY"
