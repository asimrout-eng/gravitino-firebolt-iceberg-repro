# ServiceAccount with IRSA annotation.
# Replace <ACCOUNT_ID> and <ROLE_NAME> with your values.
#
# Prerequisites:
#   1. EKS cluster with OIDC provider enabled
#   2. IAM role with S3 access + trust policy for the OIDC provider
#
# To find your OIDC ID:
#   aws eks describe-cluster --name <CLUSTER> --query "cluster.identity.oidc.issuer" --output text
#
# Trust policy for the IAM role:
#   {
#     "Version": "2012-10-17",
#     "Statement": [{
#       "Effect": "Allow",
#       "Principal": {
#         "Federated": "arn:aws:iam::<ACCOUNT_ID>:oidc-provider/oidc.eks.<REGION>.amazonaws.com/id/<OIDC_ID>"
#       },
#       "Action": "sts:AssumeRoleWithWebIdentity",
#       "Condition": {
#         "StringEquals": {
#           "oidc.eks.<REGION>.amazonaws.com/id/<OIDC_ID>:sub": "system:serviceaccount:gravitino-repro:gravitino-sa",
#           "oidc.eks.<REGION>.amazonaws.com/id/<OIDC_ID>:aud": "sts.amazonaws.com"
#         }
#       }
#     }]
#   }
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gravitino-sa
  namespace: gravitino-repro
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>"
